server:
  port: 9090
  servlet:
    context-path: /api/ragent

spring:
  application:
    name: ragent${unique-name:}-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: postgres
    password: postgres
    url: jdbc:postgresql://127.0.0.1:5432/ragent?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: ragent-producer${unique-name:}_pg
    send-message-timeout: 2000

milvus:
  uri: http://localhost:19530

rag:
  storage:
    type: s3  # 可选 s3（rustfs / minio）/ oss（阿里云）
    kb-bucket: ragent-sources        # 全局知识库桶（私有），所有知识库文档按 collectionName 目录隔离；OSS 桶名全局唯一，生产需按部署覆盖
    asset-bucket: ragent-assets # 多模态资产桶（公共读），PDF 抽出的图片等供浏览器匿名直连预览
    s3:
      endpoint: http://localhost:9000
      access-key: rustfsadmin
      secret-key: rustfsadmin
      region: us-east-1
      path-style: true
      public-url:  # 内外网端点不同时配置，留空回退 endpoint
    oss:
      endpoint: https://oss-cn-hangzhou.aliyuncs.com
      access-key: ${OSS_ACCESS_KEY:}
      secret-key: ${OSS_SECRET_KEY:}
      region: cn-hangzhou
      public-url:  # 虚拟主机式基址（含 bucket 子域），如 https://ragent-assets.oss-cn-hangzhou.aliyuncs.com；留空由 endpoint 推导

  vector:
    type: pg  # 可选 milvus / pg

  keyword:
    type: none  # 可选 none / es
    es:
      uris: http://127.0.0.1:9200
      index: rag_keyword_store  # 全库共享索引，按 collection_name 字段区分知识库
      analyzer: ik_max_word
      search-analyzer: ik_smart

  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE
    sse-timeout-ms: 300000  # SSE 全局超时（毫秒），默认 5 分钟

  query-rewrite:
    enabled: true

  rerank:
    enabled: true

  rate-limit:
    global:
      enabled: true
      max-concurrent: 10
      max-wait-seconds: 15
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 8
    summary-enabled: true
    summary-start-turns: 9
    summary-max-chars: 400
    title-max-length: 30

  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10
      max-wait-seconds: 5
      lease-seconds: 300

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://localhost:9099

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
        candidate-budget: 100
      intent-directed:
        enabled: true
        min-intent-score: 0.4
        top-k-multiplier: 2
      keyword:
        enabled: true
        mode: both
        top-k-multiplier: 2
      web-search:
        enabled: false
        count: 5
        timeout-seconds: 10
        api-key: ${YDC_API_KEY:}
    fusion:
      strategy: rrf
      rrf-k: 60
      rerank-candidate-limit: 50  # RRF 融合后送入 Rerank 的候选上限，<=0 不截断（经验值 40~100）

  trace:
    enabled: true
    max-error-length: 1000

  # 图片解析（图生文）配置
  # 产出一段自包含的知识文本：既说清"图是什么"，又完整保留所有文字与层级
  image-parse:
    description-prompt: |-
      请把这张图片的内容转写成一段自包含的知识文本，用于知识库检索与问答，不要描述颜色、布局、字体等视觉样式。要求：
      1. 开头用一两句话说明这张图是什么（主题、类型、用途），让人不看图也能明白讲的是什么。
      2. 随后按图中的分组、层级、流程关系，完整转写所有文字内容（OCR），保留每个分组标题与其下属条目的归属关系，不要遗漏任何文字。
      3. 若是图表、架构图或流程图，请补充说明各部分之间的关系（如包含、调用、先后顺序），而不只是罗列文字。
      4. 保持术语准确完整，表述贴近用户可能的提问方式。
      5. 最后另起一行，用一句话自然引出图片（例如"下方为该内容对应的原始图片："），以便在这段文字后紧接着展示图片。
    max-output-tokens: 4096

ai:
  providers:
    ollama:
      url: http://localhost:11434
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
    bailian:
      url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    aihubmix:
      url: https://aihubmix.com
      api-key: ${AIHUBMIX_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings

  selection:
    failure-threshold: 2
    open-duration-ms: 30000

  stream:
    message-chunk-size: 1

  chat:
    default-model: qwen-plus
    deep-thinking-model: qwen3-max
    candidates:
      - id: qwen-plus
        provider: bailian
        model: qwen-plus-latest
        priority: 1
      - id: qwen3-local
        provider: ollama
        model: qwen3:8b-fp16
        priority: 2
      - id: qwen3-max
        provider: bailian
        model: qwen3-max
        supports-thinking: true
        priority: 3
      - id: glm-4.7
        provider: siliconflow
        model: Pro/zai-org/GLM-4.7
        supports-thinking: true
        priority: 4
      - id: gpt-5.4
        provider: aihubmix
        model: gpt-5.4
        priority: 5

  embedding:
    default-model: qwen-emb-8b
    candidates:
      - id: qwen-emb-8b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: ${rag.default.dimension}
        priority: 1
      - id: qwen-emb-local
        provider: ollama
        model: qwen3-embedding:8b-fp16
        dimension: ${rag.default.dimension}
        priority: 2
      - id: text-embedding-3-large
        provider: aihubmix
        model: text-embedding-3-large
        dimension: ${rag.default.dimension}
        priority: 3

  rerank:
    default-model: qwen3-rerank
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100

  vlm:
    default-model: qwen-vl-max
    candidates:
      - id: qwen-vl-max
        provider: bailian
        model: qwen-vl-max

# MinerU SaaS API 配置（PDF / Word / PPT 走 MinerU 解析）
mineru:
  api-url: https://mineru.net/api/v4
  api-key: ${MINERU_API_KEY:}
  poll-interval-seconds: 5
  timeout-seconds: 300
  enable-table: true
  enable-formula: true
  ocr: false
  language: ch
  concurrency-limit: 5
  semaphore-name: rag:mineru:parse
  max-wait-seconds: 30
  lease-seconds: 900

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false

app:
  demo-mode: false
  eval:
    enabled: true
